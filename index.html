<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能现场记录系统 V3</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --border: #e2e8f0;
            --text: #1e293b;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        #clock {
            font-family: monospace;
            font-size: 1.1rem;
            color: #64748b;
        }

        .panel {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            background: #fdfdfd;
        }

        #status-bar {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 8px;
            min-height: 1.2em;
        }

        #remark-input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
            resize: vertical;
            margin-bottom: 12px;
        }

        #remark-input:focus {
            outline: 2px solid var(--primary);
            border-color: transparent;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #334155;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #preview-img {
            max-width: 100%;
            max-height: 250px;
            margin-top: 12px;
            border-radius: 6px;
            display: none;
            border: 1px solid var(--border);
            object-fit: cover;
        }

        .record-list {
            margin-top: 20px;
        }

        .record-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .record-item img {
            width: 100px;
            height: 70px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .record-meta {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 4px;
        }

        .record-actions {
            margin-left: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .empty-state {
            text-align: center;
            color: #94a3b8;
            padding: 30px;
        }

        /* 工作区管理面板 */
        #workspace-panel {
            display: none;
            background: #f1f5f9;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        #workspace-panel.active {
            display: block;
        }

        .ws-form {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }

        .ws-form input {
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .ws-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 150px;
            overflow-y: auto;
        }

        .ws-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .ws-item.active {
            border-color: var(--primary);
            background: #eff6ff;
        }

        .badge {
            background: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>现场记录助手</h1>
            <span id="clock">--:--:--</span>
        </div>

        <div class="panel">
            <div id="status-bar">等待激活备注输入框以锁定时间...</div>
            <textarea id="remark-input" rows="3" placeholder="问题描述 / 备注信息"></textarea>
            <div class="controls">
                <button id="btn-capture" class="btn btn-primary" disabled>📷 拍照并记录</button>
                <button id="btn-export" class="btn btn-secondary">📊 导出 Excel</button>
                <button id="btn-ws-toggle" class="btn btn-secondary">⚙️ 管理工作区</button>
                <button id="btn-import" class="btn btn-secondary">📥 导入记录</button>
                <label
                    style="margin-left:auto; display:flex; align-items:center; gap:4px; cursor:pointer; font-size:0.85rem;">
                    <input type="checkbox" id="view-mode-toggle"> 详细信息模式
                </label>
            </div>
            <img id="preview-img" alt="捕获预览">
        </div>

        <!-- 工作区管理面板 (隐藏/显示) -->
        <div id="workspace-panel">
            <h3 style="margin:0 0 10px 0; font-size:1rem;">📦 工作区配置</h3>
            <div class="ws-form" id="ws-form"></div>
            <div class="controls" style="margin-bottom:10px;">
                <button id="btn-ws-create" class="btn btn-primary">➕ 新建工作区</button>
                <button id="btn-ws-save" class="btn btn-secondary">💾 保存当前配置</button>
            </div>
            <div id="ws-list" class="ws-list"></div>
        </div>

        <div id="record-list" class="record-list">
            <div class="empty-state">暂无记录</div>
        </div>
    </div>

    <!-- Excel 导出核心库 (SheetJS 全功能版支持图片嵌入) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
        /**
         * 中央状态管理
         */
        const AppState = {
            currentWorkspace: null,
            workspaces: [],
            records: [],
            lockedTimestamp: null,
            currentImageBase64: null,
            viewModeDetailed: false,
            nextId: 1
        };

        const DOM = {
            remark: document.getElementById('remark-input'),
            status: document.getElementById('status-bar'),
            btnCapture: document.getElementById('btn-capture'),
            btnExport: document.getElementById('btn-export'),
            btnWsToggle: document.getElementById('btn-ws-toggle'),
            btnWsCreate: document.getElementById('btn-ws-create'),
            btnWsSave: document.getElementById('btn-ws-save'),
            wsPanel: document.getElementById('workspace-panel'),
            wsForm: document.getElementById('ws-form'),
            wsList: document.getElementById('ws-list'),
            preview: document.getElementById('preview-img'),
            list: document.getElementById('record-list'),
            viewToggle: document.getElementById('view-mode-toggle'),
            clock: document.getElementById('clock')
        };

        // 时钟显示
        setInterval(() => DOM.clock.textContent = new Date().toLocaleTimeString(), 1000);

        /* ================= 核心模块 ================= */

        /** 1. 存储适配器 (遵循 PROJECT_RULES.md 路径结构与多用户约束) */
        const Storage = {
            // 逻辑路径映射: ./workspace/ -> IndexedDB 表 'workspaces'
            // 逻辑路径映射: ./issue/{ws}/{datetime}/ -> IndexedDB 表 'issues'
            // 注意：为满足“所有用户可见”红线，实际生产应替换为 fetch('/api/...')
            _db: null,
            async init() {
                const req = indexedDB.open('TestRecordDB', 1);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('workspaces')) db.createObjectStore('workspaces', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('issues')) db.createObjectStore('issues', { keyPath: 'id' });
                };
                req.onsuccess = (e) => { this._db = e.target.result; };
            },
            async loadAll() {
                if (!this._db) return;
                const tx = this._db.transaction(['workspaces', 'issues'], 'readonly');
                tx.objectStore('workspaces').getAll().onsuccess = e => AppState.workspaces = e.target.result || [];
                tx.objectStore('issues').getAll().onsuccess = e => AppState.records = e.target.result || [];
                // 默认选中第一个或新建
                if (AppState.workspaces.length === 0) WorkspaceManager.createDefault();
                else AppState.currentWorkspace = AppState.workspaces[0].id;
            },
            async saveRecord(record) {
                if (!this._db) return;
                const tx = this._db.transaction('issues', 'readwrite');
                // 路径逻辑: ./issue/{workspace_name}/{date_time}/
                record.path = `./issue/${WorkspaceManager.get(AppState.currentWorkspace)?.name || 'default'}/${record.datetime}/`;
                tx.objectStore('issues').add(record);
            },
            async deleteRecord(id) {
                if (!this._db) return;
                this._db.transaction('issues', 'readwrite').objectStore('issues').delete(id);
            }
        };

        /** 2. 摄像头模块 (严格遵循优先级策略) */
        const Camera = {
            async getStream() {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videos = devices.filter(d => d.kind === 'videoinput');
                if (videos.length === 0) throw new Error('NO_DEVICES');

                const isPreferred = d => {
                    const l = d.label.toLowerCase();
                    return (l.includes('usb') || l.includes('camera')) && !l.includes('integrated');
                };

                const preferred = videos.filter(isPreferred);
                const fallback = videos;
                const targets = preferred.length ? preferred : fallback;

                for (const dev of targets) {
                    try {
                        return await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: dev.deviceId } } });
                    } catch { }
                }
                throw new Error('ALL_FAILED');
            },
            async capture() {
                const stream = await this.getStream();
                const video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', true);
                await video.play();

                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);

                // 立即释放硬件
                stream.getTracks().forEach(t => t.stop());
                return canvas.toDataURL('image/jpeg', 0.85);
            }
        };

        /** 3. GPS 模块 (5秒超时 + 逆地理编码) */
        const GPS = {
            async getPosition() {
                return new Promise(async (resolve) => {
                    // 如果浏览器不支持地理定位
                    if (!navigator.geolocation) {
                        return resolve({ lat: 0, lon: 0, addr: '浏览器不支持定位' });
                    }

                    // 5秒超时控制
                    const timeout = new Promise(res => setTimeout(() => res({ lat: 0, lon: 0, addr: '定位超时' }), 5000));

                    // 获取定位并解析地址
                    const geo = new Promise(async (res) => {
                        navigator.geolocation.getCurrentPosition(
                            async (pos) => {
                                const { latitude: lat, longitude: lon } = pos.coords;

                                // 优先使用 OpenStreetMap (国外服务，若被墙则使用百度)
                                try {
                                    const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=zh-CN`;
                                    const response = await fetch(url, {
                                        headers: { 'User-Agent': 'TestRecordTool/1.0' },
                                        mode: 'cors'
                                    });
                                    const data = await response.json();
                                    const a = data.address || {};
                                    const addr = `${a.state || ''}${a.city || a.county || ''}${a.district || a.suburb || ''}${a.road || ''}${a.house_number || '*号'}`;
                                    return res({ lat, lon, addr: addr.replace(/undefined/g, '') || '未知位置' });
                                } catch (err) {
                                    console.warn('OpenStreetMap解析失败，尝试百度地图:', err);
                                    // 备用方案：百度地图逆地理编码 (请替换为你的AK，或注册免费额度)
                                    try {
                                        const bdUrl = `https://api.map.baidu.com/reverse_geocoding/v3/?ak=你的百度AK&output=json&coordtype=wgs84ll&location=${lat},${lon}`;
                                        const bdRes = await fetch(bdUrl);
                                        const bdData = await bdRes.json();
                                        const addr = bdData.result.formatted_address;
                                        return res({ lat, lon, addr: addr || '百度地图解析成功' });
                                    } catch {
                                        return res({ lat, lon, addr: '地址解析失败' });
                                    }
                                }
                            },
                            (error) => {
                                let msg = '定位失败';
                                switch (error.code) {
                                    case error.PERMISSION_DENIED: msg = '用户拒绝定位权限'; break;
                                    case error.POSITION_UNAVAILABLE: msg = '位置信息不可用'; break;
                                    case error.TIMEOUT: msg = '定位超时'; break;
                                }
                                res({ lat: 0, lon: 0, addr: msg });
                            },
                            {
                                enableHighAccuracy: true, // 高精度
                                timeout: 10000, // 获取位置超时时间
                                maximumAge: 0 // 缓存超时时间
                            }
                        );
                    });

                    // 竞态处理
                    Promise.race([geo, timeout]).then(result => {
                        resolve(result);
                    });
                });
            }
        };

        /** 4. 工作区管理模块 */
        const WorkspaceManager = {
            defaults: {
                name: '工作区1', testName: '版本测试', model: 'HG36-244#', tester: '测试科',
                driver: '宋涛', route: '武汉-恩施', trailer: '5#挂', load: '满载',
                version: 'V1.1.4', weather: '晴天'
            },
            get(id) { return AppState.workspaces.find(w => w.id === id); },
            generateName() {
                const existing = AppState.workspaces.map(w => w.name);
                let n = 1;
                while (existing.includes(`工作区${n}`)) n++;
                return `工作区${n}`;
            },
            renderForm(ws) {
                DOM.wsForm.innerHTML = Object.entries(this.defaults).map(([k, v]) =>
                    `<input data-key="${k}" value="${ws ? ws[k] : v}" placeholder="${this.defaults[k]}" />`
                ).join('');
            },
            renderList() {
                DOM.wsList.innerHTML = AppState.workspaces.map(ws => `
          <div class="ws-item ${ws.id === AppState.currentWorkspace ? 'active' : ''}" data-id="${ws.id}">
            <span>${ws.name} <span class="badge">${ws.route}</span></span>
            <button class="btn btn-secondary" style="padding:2px 8px;font-size:0.75rem;" onclick="WorkspaceManager.delete('${ws.id}')">删除</button>
          </div>
        `).join('');
                DOM.wsList.querySelectorAll('.ws-item').forEach(el => {
                    el.addEventListener('click', e => {
                        if (e.target.tagName !== 'BUTTON') AppState.currentWorkspace = el.dataset.id;
                        WorkspaceManager.renderList();
                    });
                });
            },
            createDefault() {
                const id = Date.now().toString();
                AppState.workspaces.push({ id, ...this.defaults, name: this.generateName() });
                AppState.currentWorkspace = id;
                Storage.saveWorkspace?.(AppState.workspaces); // 持久化占位
            },
            async saveCurrent() {
                const inputs = DOM.wsForm.querySelectorAll('input');
                const config = {}; inputs.forEach(i => config[i.dataset.key] = i.value);
                const ws = this.get(AppState.currentWorkspace);
                Object.assign(ws, config);
                this.renderList();
                DOM.status.textContent = '✅ 工作区配置已保存';
            },
            async createNew() {
                const id = Date.now().toString();
                const name = this.generateName();
                AppState.workspaces.push({ id, ...this.defaults, name });
                AppState.currentWorkspace = id;
                this.renderForm({ name, ...this.defaults });
                this.renderList();
            },
            delete(id) {
                AppState.workspaces = AppState.workspaces.filter(w => w.id !== id);
                if (AppState.currentWorkspace === id && AppState.workspaces.length > 0) {
                    AppState.currentWorkspace = AppState.workspaces[0].id;
                }
                this.renderList();
            }
        };

        /** 5. 导出模块 (Excel 生成) */
        const Exporter = {
            async generate() {
                if (AppState.records.length === 0) return alert('无记录可导出'); // 临时提示，后续替换为UI Toast
                const ws = WorkspaceManager.get(AppState.currentWorkspace) || {};
                const wb = XLSX.utils.book_new();

                // Sheet1: 详细信息
                const data = [['问题编号', '车型', '挂车', '载荷', '系统版本', '路线', '天气', '测试人员', '司机', '日期', '时间', '地点', '经纬度', '地图链接', '问题描述']];
                const images = [];
                AppState.records.forEach((r, i) => {
                    data.push([
                        r.id, ws.model, ws.trailer, ws.load, ws.version, ws.route, ws.weather, ws.tester, ws.driver,
                        r.date, r.time, r.address, `${r.lat},${r.lon}`, r.mapUrl, r.desc
                    ]);
                    if (r.image) {
                        images.push({
                            name: `img${i}`,
                            data: Uint8Array.from(atob(r.image.split(',')[1]), c => c.charCodeAt(0)),
                            type: 'jpeg',
                            position: { col: 15, row: i + 1 },
                            style: { width: 80, height: 60 }
                        });
                    }
                });
                const ws1 = XLSX.utils.aoa_to_sheet(data);
                // 嵌入图片 (SheetJS 全功能版支持)
                if (images.length) ws1['!images'] = images;
                XLSX.utils.book_append_sheet(wb, ws1, '详细信息');

                // Sheet2: 汇总信息
                const summary = [
                    ['测试名称', ws.testName], ['车型+挂车', `${ws.model}(${ws.trailer})`],
                    ['测试人员', ws.tester], ['司机', ws.driver], ['路线', ws.route],
                    ['载荷', ws.load], ['系统版本', ws.version], ['天气', ws.weather],
                    ['记录问题数', AppState.records.length]
                ];
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summary), '汇总信息');

                const filename = `${ws.version}_${ws.model}_${ws.route}_${ws.testName}.xlsx`;
                XLSX.writeFile(wb, filename);
            }
        };

        /** 6. 列表渲染模块 */
        const ListRenderer = {
            render() {
                if (AppState.records.length === 0) {
                    DOM.list.innerHTML = '<div class="empty-state">暂无记录</div>';
                    return;
                }
                DOM.list.innerHTML = '';
                AppState.records.slice().reverse().forEach(r => {
                    const div = document.createElement('div');
                    div.className = 'record-item';
                    const imgHtml = r.image ? `<img src="${r.image}">` : '<div style="width:100px;height:70px;background:#eee;display:flex;align-items:center;justify-content:center;color:#888;font-size:10px;">无图</div>';
                    const detail = AppState.viewModeDetailed ? ` 
                        <div class="record-meta">
                            📍 ${r.address} <br> 
                            🌐 ${r.lat},${r.lon} <br> 
                            🔗 <a href="${r.mapUrl}" target="_blank" style="color:#2563eb;">查看高德地图</a>
                        </div>
                    ` : `
                        <div class="record-meta">
                            🔗 <a href="${r.mapUrl}" target="_blank" style="color:#2563eb;">地图</a> | ${r.address.substring(0, 8)}...
                        </div>
                    `;
                    div.innerHTML = `${imgHtml}<div style="flex:1"><strong>🆔 #${r.id}</strong> | 🕒 ${r.date} ${r.time}<br>📝 ${r.desc}${detail}</div>
            <div class="record-actions"><button class="btn btn-secondary" style="font-size:0.75rem;" onclick="RecordActions.delete(${r.id})">删除</button></div>`;
                    DOM.list.appendChild(div);
                });
            }
        };

        /* ================= 事件绑定 ================= */
        // 时间锁定逻辑 (PROJECT_RULES.md 红线)
        DOM.remark.addEventListener('focus', () => {
            const now = new Date();
            AppState.lockedTimestamp = now.toISOString().replace('T', ' ').split('.')[0].replace(/-/g, '/') + '.' + String(now.getMilliseconds()).padStart(3, '0');
            DOM.status.textContent = `✅ 时间已锁定: ${AppState.lockedTimestamp}`;
            DOM.btnCapture.disabled = false;
        });

        // 拍照
        DOM.btnCapture.addEventListener('click', async () => {
            if (!AppState.lockedTimestamp) return;
            DOM.btnCapture.disabled = true;
            DOM.status.textContent = '⏳ 正在获取摄像头...';
            try {
                AppState.currentImageBase64 = await Camera.capture();
                DOM.preview.src = AppState.currentImageBase64;
                DOM.preview.style.display = 'block';
                DOM.status.textContent = '📷 获取成功，正在记录...';
                await RecordActions.save();
            } catch (e) {
                DOM.status.textContent = e.message.includes('NO') ? '❌ 无法获取图片' : `❌ ${e.message}`;
                AppState.currentImageBase64 = null;
                DOM.preview.style.display = 'none';
            } finally {
                DOM.btnCapture.disabled = !AppState.lockedTimestamp;
            }
        });

        const RecordActions = {
            async save() {
                const ws = WorkspaceManager.get(AppState.currentWorkspace) || {};
                const [date, time] = AppState.lockedTimestamp.split(' ');

                const record = {
                    id: AppState.nextId++,
                    datetime: AppState.lockedTimestamp.replace(/:/g, '-'),
                    date,
                    time,
                    desc: DOM.remark.value || '无备注',
                    image: AppState.currentImageBase64,
                    address: '定位中...',
                    lat: 0,
                    lon: 0,
                    // 修改地图链接为高德地图 (国内可用)
                    mapUrl: ''
                };

                // 异步获取GPS并更新
                GPS.getPosition().then(gps => {
                    record.address = gps.addr;
                    record.lat = gps.lat;
                    record.lon = gps.lon;

                    // 使用高德地图链接 (更稳定)
                    // 如果你有百度AK，也可以替换为 `https://api.map.baidu.com/marker?location=${gps.lat},${gps.lon}&title=位置`
                    record.mapUrl = `https://www.amap.com/place/${gps.lat},${gps.lon}`;

                    AppState.records.push(record);
                    Storage.saveRecord(record);
                    ListRenderer.render();
                    DOM.status.textContent = '✅ 记录已保存 (GPS已解析)';
                }).catch(err => {
                    DOM.status.textContent = `❌ GPS解析错误: ${err.message}`;
                });

                // 重置UI
                DOM.remark.value = '';
                AppState.lockedTimestamp = null;
                AppState.currentImageBase64 = null;
                DOM.preview.style.display = 'none';
                DOM.status.textContent = '等待激活备注输入框以锁定时间...';
                DOM.btnCapture.disabled = true;
            },
            delete(id) {
                AppState.records = AppState.records.filter(r => r.id !== id);
                Storage.deleteRecord(id);
                ListRenderer.render();
            }
        };

        DOM.viewToggle.addEventListener('change', e => { AppState.viewModeDetailed = e.target.checked; ListRenderer.render(); });
        DOM.btnExport.addEventListener('click', Exporter.generate);
        DOM.btnWsToggle.addEventListener('click', () => {
            DOM.wsPanel.classList.toggle('active');
            const ws = WorkspaceManager.get(AppState.currentWorkspace);
            WorkspaceManager.renderForm(ws);
            WorkspaceManager.renderList();
        });
        DOM.btnWsCreate.addEventListener('click', WorkspaceManager.createNew);
        DOM.btnWsSave.addEventListener('click', WorkspaceManager.saveCurrent);

        // 初始化
        Storage.init().then(() => Storage.loadAll().then(() => ListRenderer.render()));
    </script>
</body>

</html>
