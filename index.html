<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全能打卡记录器</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        
        /* 输入区域样式 */
        .input-group { margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        
        /* 按钮样式 */
        .btn-record { width: 100%; padding: 15px; background-color: #3498db; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; transition: background 0.3s; }
        .btn-record:hover { background-color: #2980b9; }
        .btn-record:disabled { background-color: #95a5a6; cursor: not-allowed; }

        /* 状态显示 */
        #status { margin-top: 15px; text-align: center; font-size: 14px; color: #7f8c8d; min-height: 20px; }

        /* 隐藏的视频元素 (用于抓取画面) */
        #video { display: none; }
        #canvas { display: none; }

        /* 记录列表样式 */
        .record-list { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
        .record-item { border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; background: #fafafa; }
        .record-img { width: 150px; height: 100px; object-fit: cover; border-radius: 4px; background: #eee; }
        .record-info { flex: 1; }
        .record-time { font-weight: bold; color: #2c3e50; font-size: 1.1em; }
        .record-note { color: #555; margin: 5px 0; }
        .record-loc { font-size: 0.9em; color: #7f8c8d; }
        
        /* 移动端适配 */
        @media (max-width: 600px) {
            .record-item { flex-direction: column; }
            .record-img { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📍 现场记录助手</h1>
    
    <div class="input-group">
        <input type="text" id="noteInput" placeholder="请输入备注信息（例如：拜访客户、设备检查...）">
    </div>

    <button id="recordBtn" class="btn-record">📸 点击立即记录</button>
    <div id="status">准备就绪，请点击按钮开始</div>

    <!-- 隐藏的媒体元素 -->
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <div class="record-list" id="recordList">
        <!-- 记录将在这里生成 -->
    </div>
</div>

<script>
    const recordBtn = document.getElementById('recordBtn');
    const statusDiv = document.getElementById('status');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const recordList = document.getElementById('recordList');
    const noteInput = document.getElementById('noteInput');

    // 1. 获取毫秒级时间
    function getCurrentTimeMs() {
        const now = new Date();
        return {
            str: now.toLocaleString('zh-CN', { hour12: false }) + '.' + String(now.getMilliseconds()).padStart(3, '0'),
            obj: now
        };
    }

    // 2. 获取地理位置 (使用 OpenStreetMap 进行逆地理编码，无需 Key)
    async function getLocation() {
        return new Promise((resolve, reject) => {
            if (!navigator.geolocation) {
                reject("浏览器不支持地理位置");
            } else {
                statusDiv.textContent = "正在获取 GPS 位置...";
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        // 调用 OpenStreetMap Nominatim API 获取具体地址
                        try {
                            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`);
                            const data = await response.json();
                            resolve({
                                lat: lat,
                                lng: lng,
                                address: data.display_name || "未知地址"
                            });
                        } catch (e) {
                            resolve({ lat, lng, address: "地址解析失败" });
                        }
                    },
                    (error) => {
                        reject("无法获取位置: " + error.message);
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }
        });
    }

    // 3. 拍照功能
    async function takePhoto() {
        try {
            statusDiv.textContent = "正在启动摄像头...";
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }); // 优先使用后置摄像头
            video.srcObject = stream;
            
            return new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    // 等待画面稳定
                    setTimeout(() => {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7); // 压缩图片
                        stream.getTracks().forEach(track => track.stop()); // 关闭摄像头
                        resolve(dataUrl);
                    }, 500);
                };
            });
        } catch (err) {
            throw new Error("摄像头访问失败: " + err.message);
        }
    }

    // 主逻辑
    recordBtn.addEventListener('click', async () => {
        recordBtn.disabled = true;
        const note = noteInput.value.trim();
        const timeData = getCurrentTimeMs();

        try {
            // 并行执行拍照和获取位置，提高效率
            statusDiv.textContent = "正在处理数据（拍照+定位）...";
            const [photoData, locationData] = await Promise.all([
                takePhoto(),
                getLocation()
            ]);

            // 创建记录对象
            const record = {
                id: Date.now(),
                time: timeData.str,
                note: note || "无备注",
                photo: photoData,
                location: locationData
            };

            renderRecord(record);
            statusDiv.textContent = "记录成功！";
            noteInput.value = ""; // 清空备注

        } catch (error) {
            console.error(error);
            statusDiv.textContent = "发生错误: " + error.message;
            alert("错误: " + error.message + "\n\n请确保：\n1. 使用 HTTPS 或 localhost 访问\n2. 允许了摄像头和位置权限");
        } finally {
            recordBtn.disabled = false;
        }
    });

    // 渲染记录到页面
    function renderRecord(record) {
        const div = document.createElement('div');
        div.className = 'record-item';
        div.innerHTML = `
            <img src="${record.photo}" class="record-img" alt="现场照片">
            <div class="record-info">
                <div class="record-time">⏰ ${record.time}</div>
                <div class="record-note">📝 ${record.note}</div>
                <div class="record-loc">📍 ${record.location.address}</div>
                <div class="record-loc" style="font-size:0.8em; color:#aaa;">经纬度: ${record.location.lat.toFixed(5)}, ${record.location.lng.toFixed(5)}</div>
            </div>
        `;
        // 插入到最前面
        recordList.insertBefore(div, recordList.firstChild);
    }
</script>

</body>
</html>
